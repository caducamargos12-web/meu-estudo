<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meu Estudo – 3º Ano CNS Anglo</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1a1611;
    --bg-elev:#211c15;
    --surface:#2a241b;
    --surface-2:#332c21;
    --border:#3a3225;
    --border-bright:#4d4332;
    --accent:#d9a865;
    --accent-dim:#a87d44;
    --accent-glow:rgba(217,168,101,.18);
    --green:#a8c08a;
    --amber:#e0b876;
    --red:#d99080;
    --text:#f4ede0;
    --text-2:#c4b8a4;
    --text-3:#8a7d68;
    --sans:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;position:relative}

  /* imagem de fundo visível — fica FIXA atrás de tudo */
  .bg-layer{position:fixed;inset:0;z-index:-2;background:url('/fundo.jpg') center/cover no-repeat;opacity:.6}
  .bg-tint{position:fixed;inset:0;z-index:-1;background:linear-gradient(180deg,rgba(26,22,17,.62),rgba(26,22,17,.78))}

  /* ═══ animações ═══ */
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.01ms!important;transition-duration:.01ms!important}
    .card{opacity:1!important}
  }

  /* ═══ LOGIN ═══ */
  #loginScreen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-box{width:100%;max-width:380px;position:relative;z-index:1;animation:scaleIn .5s cubic-bezier(.2,.8,.2,1)}
  .login-brand{text-align:center;margin-bottom:32px}
  .login-logo{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;color:var(--text-2);letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;padding:6px 14px;border:1px solid var(--border);border-radius:100px;background:var(--surface)}
  .login-logo .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .login-box h1{font-size:32px;font-weight:800;letter-spacing:-1.5px;line-height:1.1}
  .login-box .tag{font-size:14px;color:var(--text-2);margin-top:8px}
  .login-card{background:linear-gradient(180deg,var(--surface),var(--bg-elev));border:1px solid var(--border);border-radius:18px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .field{margin-bottom:16px}
  .field label{font-size:12px;font-weight:500;color:var(--text-2);display:block;margin-bottom:7px}
  .field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:11px;color:var(--text);font-family:var(--sans);font-size:15px;padding:13px 15px;outline:none;transition:border-color .2s,box-shadow .2s}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .field input::placeholder{color:var(--text-3)}
  .btn-primary{width:100%;padding:14px;border-radius:11px;border:none;background:var(--accent);color:#fff;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;transition:transform .12s,background .2s,box-shadow .2s;box-shadow:0 4px 16px var(--accent-glow)}
  .btn-primary:hover{background:#6f9cff;transform:translateY(-1px);box-shadow:0 6px 22px var(--accent-glow)}
  .btn-primary:active{transform:translateY(0) scale(.99)}
  .btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .login-erro{font-size:13px;color:var(--red);margin-top:12px;text-align:center;min-height:18px;transition:opacity .2s}
  .login-foot{text-align:center;font-size:12px;color:var(--text-3);margin-top:20px;line-height:1.6}

  /* ═══ HEADER ═══ */
  #appScreen{position:relative;z-index:1}
  header{position:sticky;top:0;z-index:100;background:rgba(26,22,17,.65);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:16px 22px}
  .head-row{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
  .head-left{display:flex;align-items:center;gap:12px}
  .head-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent-dim));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:17px;color:#fff;box-shadow:0 2px 12px var(--accent-glow)}
  .head-titles h1{font-size:17px;font-weight:700;letter-spacing:-.3px;line-height:1}
  .head-titles .sub{font-size:12px;color:var(--text-2);margin-top:3px}
  .head-right{display:flex;align-items:center;gap:14px}
  #clock{font-family:var(--mono);font-size:13px;color:var(--text-3)}
  .logout-btn{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-2);font-size:12px;padding:6px 11px;cursor:pointer;transition:all .15s;font-family:var(--sans)}
  .logout-btn:hover{border-color:var(--border-bright);color:var(--text)}

  main{max-width:720px;margin:0 auto;padding:24px 22px 80px}

  /* ═══ DAY HEADER ═══ */
  .day-head{display:flex;align-items:center;gap:12px;margin-bottom:24px;animation:fadeUp .5s cubic-bezier(.2,.8,.2,1)}
  .day-badge{font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-glow);border:1px solid var(--accent-dim);padding:5px 13px;border-radius:100px}
  .day-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}
  .day-count{font-family:var(--mono);font-size:12px;color:var(--text-3)}

  /* ═══ CARDS ═══ */
  .card{background:linear-gradient(180deg,rgba(42,36,27,.88),rgba(33,28,21,.92));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--border-bright);border-radius:18px;margin-bottom:18px;overflow:hidden;animation:fadeUp .55s cubic-bezier(.2,.8,.2,1) both;transition:border-color .25s,transform .25s}
  .card:hover{border-color:var(--border-bright);transform:translateY(-2px)}
  .card-glow{height:2px;background:linear-gradient(90deg,transparent,var(--cor,var(--accent)),transparent);opacity:.6}
  .card-in{padding:20px}
  .c-head{display:flex;align-items:center;gap:13px;margin-bottom:18px}
  .c-icon{width:44px;height:44px;border-radius:12px;background:color-mix(in srgb,var(--cor,var(--accent)) 14%,var(--surface));border:1px solid color-mix(in srgb,var(--cor,var(--accent)) 30%,transparent);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .c-meta{flex:1;min-width:0}
  .c-subj{font-size:18px;font-weight:700;letter-spacing:-.3px}
  .c-prof{font-size:12px;color:var(--text-2);margin-top:2px;font-family:var(--mono)}

  .blk{border:1px solid var(--border);background:var(--bg);border-radius:13px;padding:14px;margin-bottom:11px}
  .blk-head{display:flex;align-items:center;gap:7px;margin-bottom:9px}
  .blk-ic{font-size:13px}
  .blk-label{font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .blk-body{font-size:14px;line-height:1.65;color:var(--text)}
  .blk-aula .blk-label{color:var(--text-2)}
  .blk-teste{border-color:color-mix(in srgb,var(--accent) 35%,transparent);background:color-mix(in srgb,var(--accent) 9%,var(--bg))}
  .blk-teste .blk-label{color:var(--accent)}
  .blk-dev{border-color:color-mix(in srgb,var(--amber) 22%,transparent);background:color-mix(in srgb,var(--amber) 5%,var(--bg))}
  .blk-dev .blk-label{color:var(--amber)}
  .blk-res{border-color:color-mix(in srgb,var(--accent) 22%,transparent);background:color-mix(in srgb,var(--accent) 5%,var(--bg))}
  .blk-res .blk-label{color:var(--accent)}
  .blk-quiz{border-color:color-mix(in srgb,var(--green) 22%,transparent);background:color-mix(in srgb,var(--green) 5%,var(--bg))}
  .blk-quiz .blk-label{color:var(--green)}
  .blk-prox{border-color:color-mix(in srgb,var(--accent) 22%,transparent);background:color-mix(in srgb,var(--accent) 5%,var(--bg))}
  .blk-prox .blk-label{color:var(--accent)}

  .dev-group{margin-bottom:11px}
  .dev-group:last-child{margin-bottom:0}
  .dev-date{font-family:var(--mono);font-size:11px;color:var(--amber);margin-bottom:5px;font-weight:500}
  .dev-item{display:flex;gap:8px;font-size:13px;line-height:1.5;margin-bottom:4px;color:var(--text)}
  .dev-dot{color:var(--amber);flex-shrink:0}
  .muted{font-size:13px;color:var(--text-3)}

  /* quiz */
  .q-item{margin-bottom:15px}
  .q-item:last-child{margin-bottom:0}
  .q-text{font-size:14px;font-weight:600;margin-bottom:9px;line-height:1.45}
  .q-opts{display:flex;flex-direction:column;gap:6px}
  .q-opt{padding:10px 13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;text-align:left;color:var(--text);font-family:var(--sans);transition:all .15s;display:flex;gap:8px;align-items:center}
  .q-opt:hover:not(:disabled){border-color:var(--accent);background:var(--surface-2);transform:translateX(2px)}
  .q-opt b{color:var(--text-2);font-weight:700}
  .q-opt.correct{background:color-mix(in srgb,var(--green) 14%,transparent);border-color:var(--green);color:var(--green)}
  .q-opt.correct b{color:var(--green)}
  .q-opt.wrong{background:color-mix(in srgb,var(--red) 14%,transparent);border-color:var(--red);color:var(--red)}
  .q-opt.wrong b{color:var(--red)}
  .q-opt:disabled{cursor:default}
  .q-fb{font-size:12px;margin-top:7px;padding:9px 11px;border-radius:9px;line-height:1.45;animation:fadeIn .3s}
  .q-fb.correct{background:color-mix(in srgb,var(--green) 9%,transparent);color:var(--green)}
  .q-fb.wrong{background:color-mix(in srgb,var(--red) 9%,transparent);color:var(--red)}
  .score{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--surface);border-radius:10px;margin-top:10px;font-size:12px;color:var(--text-2)}
  .score b{font-size:15px;color:var(--green);font-weight:700}

  /* loading */
  .skel{border:1px solid var(--border);background:var(--surface);border-radius:18px;padding:20px;margin-bottom:18px;display:flex;align-items:center;gap:13px}
  .spin{width:20px;height:20px;border:2px solid var(--border-bright);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  .skel-txt{font-size:14px;color:var(--text-2)}
  .skel-bar{height:11px;border-radius:6px;background:linear-gradient(90deg,var(--surface),var(--surface-2),var(--surface));background-size:200% 100%;animation:shimmer 1.4s infinite;flex:1}

  .big-load{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:18px}
  .big-spin{width:38px;height:38px;border:3px solid var(--border-bright);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
  .big-load-txt{font-size:14px;color:var(--text-2);text-align:center;line-height:1.7}

  .empty-box{text-align:center;padding:50px 24px;animation:fadeUp .5s}
  .empty-emoji{font-size:42px;margin-bottom:14px}
  .empty-title{font-size:18px;font-weight:700;margin-bottom:6px}
  .empty-sub{font-size:14px;color:var(--text-2);line-height:1.6}
  .empty-box .btn-primary{max-width:200px;margin:18px auto 0}

  .foot{text-align:center;font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:28px;letter-spacing:.5px}

  /* ═══ PLAYER DE MÚSICA ═══ */
  .music-btn{position:fixed;bottom:20px;right:20px;z-index:500;width:48px;height:48px;border-radius:50%;background:var(--surface);border:1px solid var(--border-bright);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(0,0,0,.4);transition:all .2s;font-size:18px}
  .music-btn:hover{transform:scale(1.08);border-color:var(--accent);box-shadow:0 8px 30px var(--accent-glow)}
  .music-btn.playing{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  .music-btn .bars{display:flex;align-items:flex-end;gap:2px;height:16px}
  .music-btn .bars span{width:3px;background:currentColor;border-radius:2px;height:5px}
  .music-btn.playing .bars span{animation:eq .9s ease-in-out infinite}
  .music-btn.playing .bars span:nth-child(2){animation-delay:.2s}
  .music-btn.playing .bars span:nth-child(3){animation-delay:.4s}
  .music-btn.playing .bars span:nth-child(4){animation-delay:.6s}
  @keyframes eq{0%,100%{height:5px}50%{height:15px}}
</style>
</head>
<body>
<div class="bg-layer"></div>
<div class="bg-tint"></div>

<!-- ═══ LOGIN ═══ -->
<div id="loginScreen" style="display:none">
  <div class="login-box">
    <div class="login-brand">
      <div class="login-logo"><span class="dot"></span>CNS Anglo · 3º Ano</div>
      <h1>Meu Estudo</h1>
      <div class="tag">Seu resumo do dia, pronto em segundos.</div>
    </div>
    <div class="login-card">
      <div class="field">
        <label>Usuário</label>
        <input id="loginUser" type="text" autocomplete="username" placeholder="seu usuário">
      </div>
      <div class="field">
        <label>Senha</label>
        <input id="loginPass" type="password" autocomplete="current-password" placeholder="sua senha">
      </div>
      <button class="btn-primary" id="loginBtn" onclick="fazerLogin()">Entrar</button>
      <div class="login-erro" id="loginErro"></div>
    </div>
    <div class="login-foot">Ainda não tem acesso?<br>Faça o Pix e chame o administrador para liberar.</div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="appScreen" style="display:none">
  <audio id="bgMusic" loop preload="none">
    <source src="/musica.mp3" type="audio/mpeg">
  </audio>
  <button class="music-btn" id="musicBtn" onclick="toggleMusic()" aria-label="Música de fundo" title="Música de fundo">
    <div class="bars"><span></span><span></span><span></span><span></span></div>
  </button>
  <header>
    <div class="head-row">
      <div class="head-left">
        <div class="head-mark">M</div>
        <div class="head-titles">
          <h1>Meu Estudo</h1>
          <div class="sub" id="subtitle">Carregando…</div>
        </div>
      </div>
      <div class="head-right">
        <span id="clock"></span>
        <button class="logout-btn" onclick="sair()">Sair</button>
      </div>
    </div>
  </header>
  <main id="main">
    <div class="big-load">
      <div class="big-spin"></div>
      <div class="big-load-txt">Lendo os blogs dos professores<br>e preparando seu material…</div>
    </div>
  </main>
</div>

<script>
const EMOJIS={'Filosofia':'🧠','Geografia':'🌍','Prog. Lidere':'🎯','História':'📜','Química A':'⚗️','Física':'🔭','Linguística':'📝','Matemática A':'📐','Matemática B':'📊','Inglês':'🇺🇸','Biologia':'🧬','Química B':'🔬','Práticas/Red.':'✍️','Literatura':'📚','Redação':'✍️','Sociologia':'🏛️'};
const CORES=['#d9a865','#c99a78','#a8c08a','#e0b876','#d9a0a0','#b89a7a','#cbb88a','#d4a574'];
const scores={};

function toggleMusic(){
  const audio=document.getElementById('bgMusic');
  const btn=document.getElementById('musicBtn');
  if(audio.paused){
    audio.volume=0.35;
    audio.play().then(()=>{
      btn.classList.add('playing');
      localStorage.setItem('musicOn','1');
    }).catch(()=>{});
  }else{
    audio.pause();
    btn.classList.remove('playing');
    localStorage.setItem('musicOn','0');
  }
}

function updateClock(){const el=document.getElementById('clock');if(el)el.textContent=new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}

function checkAnswer(cardId,qi,chosen,correta,explicacao){
  document.querySelectorAll(`[id^="opt-${cardId}-${qi}-"]`).forEach(o=>{
    o.disabled=true;
    const k=o.id.split('-').pop();
    if(k===correta)o.classList.add('correct');
    else if(k===chosen&&chosen!==correta)o.classList.add('wrong');
  });
  const ok=chosen===correta;
  document.getElementById(`fb-${cardId}-${qi}`).innerHTML=
    `<div class="q-fb ${ok?'correct':'wrong'}">${ok?'✓ Correto. ':'✕ Errado. '}${explicacao}</div>`;
  if(!scores[cardId])scores[cardId]={a:0,t:0,v:new Set()};
  if(!scores[cardId].v.has(qi)){scores[cardId].v.add(qi);scores[cardId].t++;if(ok)scores[cardId].a++;}
  const el=document.getElementById('score-'+cardId);
  if(el){const s=scores[cardId];el.innerHTML=`Placar <b>${s.a}/${s.t}</b>`;}
}

function renderCard(item, idx){
  const cardId=`d-${idx}`;
  const cor=CORES[idx%CORES.length];
  const emoji=EMOJIS[item.m]||'📖';

  const deveresHtml=item.deveres_pendentes?.length
    ?item.deveres_pendentes.map(g=>`
      <div class="dev-group">
        <div class="dev-date">${g.data}</div>
        ${(g.deveres||[]).map(d=>`<div class="dev-item"><span class="dev-dot">▸</span><span>${d}</span></div>`).join('')}
      </div>`).join('')
    :`<div class="muted">Nenhum dever pendente das aulas anteriores.</div>`;

  const quizHtml=item.questoes?.length
    ?item.questoes.map((q,qi)=>`
      <div class="q-item">
        <div class="q-text">${qi+1}. ${q.enunciado}</div>
        <div class="q-opts">
          ${Object.entries(q.opcoes).map(([k,v])=>`
            <button class="q-opt" id="opt-${cardId}-${qi}-${k}"
              onclick="checkAnswer('${cardId}',${qi},'${k}','${q.correta}',\`${q.explicacao.replace(/`/g,"'")}\`)">
              <b>${k}</b> ${v}
            </button>`).join('')}
        </div>
        <div id="fb-${cardId}-${qi}"></div>
      </div>`).join('')
    :`<div class="muted">Simulado não disponível.</div>`;

  const temProx=item.proxima_aula&&item.proxima_aula.trim().length>2;
  const proxDev=item.proxima_deveres?.length
    ?`<div style="margin-top:9px">${item.proxima_deveres.map(d=>`<div class="dev-item"><span class="dev-dot" style="color:var(--accent)">▸</span><span>${d}</span></div>`).join('')}</div>`:'';
  const proxSec=temProx?`
    <div class="blk blk-prox">
      <div class="blk-head"><span class="blk-ic">🔜</span><span class="blk-label">Próxima aula</span></div>
      <div class="blk-body"><strong>${item.proxima_aula}</strong></div>
      ${item.proxima_resumo?`<div class="blk-body" style="margin-top:6px;color:var(--text-2)">${item.proxima_resumo}</div>`:''}
      ${proxDev}
    </div>`:'';

  return `<div class="card" style="--cor:${cor};animation-delay:${idx*0.06}s">
    <div class="card-glow"></div>
    <div class="card-in">
      <div class="c-head">
        <div class="c-icon">${emoji}</div>
        <div class="c-meta">
          <div class="c-subj">${item.m}</div>
          <div class="c-prof">${item.p}</div>
        </div>
      </div>
      <div class="blk blk-aula">
        <div class="blk-head"><span class="blk-ic">📅</span><span class="blk-label">Aula de hoje</span></div>
        <div class="blk-body">${item.aula_hoje||'—'}</div>
      </div>
      <div class="blk blk-teste">
        <div class="blk-head"><span class="blk-ic">🎯</span><span class="blk-label">Matéria para o teste de hoje${item.materia_teste_data?' · '+item.materia_teste_data:''}</span></div>
        <div class="blk-body">${item.materia_teste||'—'}</div>
      </div>
      <div class="blk blk-dev">
        <div class="blk-head"><span class="blk-ic">⚡</span><span class="blk-label">Deveres pendentes</span></div>
        ${deveresHtml}
      </div>
      <div class="blk blk-res">
        <div class="blk-head"><span class="blk-ic">📖</span><span class="blk-label">Resumo da matéria do teste</span></div>
        <div class="blk-body">${(item.resumo||'').replace(/\n/g,'<br>')}</div>
      </div>
      <div class="blk blk-quiz">
        <div class="blk-head"><span class="blk-ic">📝</span><span class="blk-label">Simulado para o teste</span></div>
        ${quizHtml}
        <div class="score" id="score-${cardId}">Responda as questões acima</div>
      </div>
      ${proxSec}
    </div>
  </div>`;
}

function loadDay(){
  document.getElementById('subtitle').textContent='Carregando…';
  const main=document.getElementById('main');
  main.innerHTML=`<div class="day-head"><span class="day-badge" id="day-badge">Hoje</span><span class="day-line"></span><span class="day-count" id="day-count"></span></div><div id="cards"></div>`;

  const token=localStorage.getItem('sessionToken');
  const evtSource=new EventSource(`/api/today?token=${encodeURIComponent(token)}`);
  let total=0;let done=0;

  evtSource.onmessage=function(e){
    const msg=JSON.parse(e.data);
    if(msg.type==='start'){
      total=msg.total;
      document.getElementById('day-badge').textContent=msg.dayLabel;
      document.getElementById('subtitle').textContent=msg.dayLabel;
      const cards=document.getElementById('cards');
      cards.innerHTML='';
      for(let i=0;i<total;i++){
        const div=document.createElement('div');
        div.id=`slot-${i}`;
        div.innerHTML=`<div class="skel"><div class="spin"></div><div class="skel-bar"></div></div>`;
        cards.appendChild(div);
      }
    }
    if(msg.type==='weekend'){
      main.innerHTML=`<div class="empty-box"><div class="empty-emoji">🎉</div><div class="empty-title">Fim de semana</div><div class="empty-sub">Não há aulas hoje.<br>Volte na segunda-feira para ver suas matérias.</div></div>`;
    }
    if(msg.type==='loading'){
      const slot=document.getElementById(`slot-${msg.index}`);
      if(slot)slot.innerHTML=`<div class="skel"><div class="spin"></div><div class="skel-txt">Preparando ${msg.materia}…</div></div>`;
    }
    if(msg.type==='result'){
      done++;
      const slot=document.getElementById(`slot-${msg.index}`);
      if(slot)slot.innerHTML=renderCard(msg.item,msg.index);
      const c=document.getElementById('day-count');if(c)c.textContent=`${done}/${total}`;
    }
    if(msg.type==='done'){
      evtSource.close();
      if(total>0){
        document.getElementById('subtitle').textContent=`${total} matérias hoje`;
        const c=document.getElementById('day-count');if(c)c.textContent=`${total} matérias`;
        document.getElementById('cards').insertAdjacentHTML('beforeend',
          `<div class="foot">CNS Anglo · ${new Date().toLocaleDateString('pt-BR')}${msg.fromCache?' · atualizado hoje':''}</div>`);
      }
    }
  };
  evtSource.onerror=function(){
    evtSource.close();
    if(done===0){
      main.innerHTML=`<div class="empty-box"><div class="empty-emoji">⚠️</div><div class="empty-title">Não foi possível carregar</div><div class="empty-sub">Sua sessão pode ter expirado.</div><button class="btn-primary" onclick="sair()">Entrar de novo</button></div>`;
    }
  };
}

function getDeviceId(){
  let id=localStorage.getItem('deviceId');
  if(!id){id='dev_'+Math.random().toString(36).slice(2)+Date.now().toString(36);localStorage.setItem('deviceId',id);}
  return id;
}

async function fazerLogin(){
  const user=document.getElementById('loginUser').value.trim();
  const pass=document.getElementById('loginPass').value;
  const erro=document.getElementById('loginErro');
  const btn=document.getElementById('loginBtn');
  if(!user||!pass){erro.textContent='Preencha usuário e senha.';return;}
  btn.disabled=true;btn.textContent='Entrando…';erro.textContent='';
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user,pass,device:getDeviceId()})});
    const data=await res.json();
    if(data.error){erro.textContent=data.error;btn.disabled=false;btn.textContent='Entrar';return;}
    localStorage.setItem('sessionToken',data.token);
    localStorage.setItem('sessionUser',data.user);
    iniciarApp();
  }catch(e){erro.textContent='Erro de conexão. Tente novamente.';btn.disabled=false;btn.textContent='Entrar';}
}

function sair(){
  localStorage.removeItem('sessionToken');
  localStorage.removeItem('sessionUser');
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  const btn=document.getElementById('loginBtn');btn.disabled=false;btn.textContent='Entrar';
}

function iniciarApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  updateClock();setInterval(updateClock,1000);
  loadDay();
}

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none'){fazerLogin();}
});

(function init(){
  if(localStorage.getItem('sessionToken')){iniciarApp();}
  else{document.getElementById('loginScreen').style.display='flex';}
})();
</script>
</body>
</html>
